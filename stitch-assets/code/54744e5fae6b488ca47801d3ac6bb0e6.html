<script id="tailwind-config">

            darkMode: "class",

                    colors: {
                        "primary": "#FF6B00",
                        "background-light": "#FDF9F1",
                        "background-dark": "#23170f",
                        "surface": "#FFFFFF",

                        "muted": "#A89B92",

                    fontFamily: {
                        "display": ["Spline Sans", "sans-serif"]

                    borderRadius: {
                        "DEFAULT": "0.25rem",

                        "full": "9999px"

                        'soft': '0 8px 16px rgba(74, 59, 50, 0.08)',

<style>
        body {
            font-family: 'Spline Sans', sans-serif;
            background-color: #FDF9F1; /* Fallback */
            color: #4A3B32;
            -webkit-tap-highlight-color: transparent;
        }
        
        .stat-card:active {
            transform: scale(0.95);
            transition: transform 0.1s ease;
        }

        .stat-card {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);

<span class="text-sm font-semibold text-muted">Offline</span>
</div>
</div>

</div>
<div>
<p class="text-sm font-semibold text-muted leading-tight mb-1">Stok Menipis</p>

</div>
</button>
<!-- Stat Card 2 -->
<button class="stat-card flex flex-col justify-between h-[120px] bg-surface rounded-md p-4 shadow-soft text-left w-full border-2 border-transparent focus:outline-none focus:border-primary">
<div class="flex items-center justify-center size-10 rounded-full bg-accent/10 text-accent mb-2">
<span class="material-symbols-outlined text-[24px]">inventory_2</span>
</div>
<div>
<p class="text-sm font-semibold text-muted leading-tight mb-1">Barang Masuk</p>
<p class="text-xl font-extrabold text-text-main leading-none">12</p>
</div>
</button>

<button class="stat-card flex flex-col justify-between h-[120px] bg-surface rounded-md p-4 shadow-soft text-left w-full border-2 border-transparent focus:outline-none focus:border-primary">
<div class="flex items-center justify-center size-10 rounded-full bg-primary/10 text-primary mb-2">
<span class="material-symbols-outlined text-[24px]">category</span>
</div>
<div>
<p class="text-sm font-semibold text-muted leading-tight mb-1">Total Produk</p>
<p class="text-xl font-extrabold text-text-main leading-none">84</p>
</div>
</button>
<!-- Stat Card 4 -->
<button class="stat-card flex flex-col justify-between h-[120px] bg-surface rounded-md p-4 shadow-soft text-left w-full border-2 border-transparent focus:outline-none focus:border-primary">
<div class="flex items-center justify-center size-10 rounded-full bg-accent/10 text-accent mb-2">
<span class="material-symbols-outlined text-[24px]">check_circle</span>
</div>
<div>
<p class="text-sm font-semibold text-muted leading-tight mb-1">Status Toko</p>

</div>

<div class="fixed bottom-0 left-0 right-0 w-full max-w-md mx-auto p-4 bg-gradient-to-t from-background-light via-background-light to-transparent pb-6 z-50">
<button class="w-full h-[56px] bg-primary text-surface rounded-full flex items-center justify-center gap-2 shadow-soft text-lg font-extrabold active:scale-[0.98] transition-transform">
<span class="text-2xl">📝</span> Mulai Opname
            </button>
</div>
</div>
