<!-- Simple script to handle scroll shadow -->
<script>
        const scrollArea = document.getElementById('main-scroll');
        const header = document.getElementById('sticky-header');
        
        scrollArea.addEventListener('scroll', () => {
            if (scrollArea.scrollTop > 10) {
                header.classList.add('shadow-soft');
                header.classList.remove('bg-background-light');
                header.classList.add('bg-surface');
            } else {
                header.classList.remove('shadow-soft');
                header.classList.remove('bg-surface');
                header.classList.add('bg-background-light');
            }
        });
    </script>
